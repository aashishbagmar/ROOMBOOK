<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoomBook</title>
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" type="text/javascript"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .loader {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Segoe UI', sans-serif; color: #64748b;
            flex-direction: column; background: #f8fafc;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top-color: #3b82f6; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        Office.onReady(function(info) {
            console.log("Office.js ready, host: " + info.host);
            document.getElementById("loader").style.display = "none";
            document.getElementById("app-frame").style.display = "block";
        });
    </script>
</head>
<body>
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Loading RoomBook...</p>
    </div>
    <iframe id="app-frame" src="/login" style="display:none;"></iframe>
</body>
</html>
