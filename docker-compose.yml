version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: roombook-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roombook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roombook_secret}
      POSTGRES_DB: ${POSTGRES_DB:-roombook}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roombook}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roombook-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roombook}:${POSTGRES_PASSWORD:-roombook_secret}@db:5432/${POSTGRES_DB:-roombook}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-roombook}:${POSTGRES_PASSWORD:-roombook_secret}@db:5432/${POSTGRES_DB:-roombook}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@roombook.internal}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ─── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roombook-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: roombook-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/var/www/certbot:ro
      - letsencrypt_data:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  # ─── Certbot (Let's Encrypt) ──────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: roombook-certbot
    volumes:
      - certbot_data:/var/www/certbot
      - letsencrypt_data:/etc/letsencrypt
    # Run: docker compose run certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
    entrypoint: "echo 'Run: docker compose run certbot certonly --webroot -w /var/www/certbot -d yourdomain.com'"

volumes:
  postgres_data:
  certbot_data:
  letsencrypt_data:
